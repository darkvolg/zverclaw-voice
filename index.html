<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>ZverClaw Запись</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-user-select:none;user-select:none;padding:16px 12px 120px}
#rec-area{display:flex;flex-direction:column;align-items:center;margin:20px 0 8px}
#btn{width:50vw;height:50vw;max-width:200px;max-height:200px;border-radius:50%;border:none;font-size:20px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
#btn.idle{background:#16213e;color:#e94560;box-shadow:0 0 30px rgba(233,69,96,.3)}
#btn.rec{background:#e94560;color:#fff;box-shadow:0 0 50px rgba(233,69,96,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#icon{font-size:48px}
#timer{font-size:14px;opacity:.7}
#status{margin-top:10px;font-size:15px;text-align:center;min-height:24px;opacity:.8}
#list{width:100%;max-width:400px}
.item{background:#16213e;border-radius:12px;padding:12px;margin:8px 0;display:flex;align-items:center;gap:10px}
.item .num{font-size:22px;font-weight:700;color:#e94560;min-width:28px;text-align:center}
.item .info{flex:1;font-size:13px;opacity:.8}
.item .info .dur{font-size:15px;opacity:1;color:#eee}
.item button{border:none;border-radius:8px;padding:8px 12px;font-size:18px;cursor:pointer;min-width:44px;min-height:44px}
.item .play{background:#0f3460;color:#4ecca3}
.item .play.playing{background:#4ecca3;color:#0f3460}
.item .del{background:#2a1030;color:#e94560}
.sent{opacity:.4}
.sent .num{color:#4ecca3}
#send-bar{position:fixed;bottom:0;left:0;right:0;background:#0f3460;padding:14px;display:flex;gap:10px;justify-content:center;align-items:center}
#send-btn{background:#4ecca3;color:#1a1a2e;border:none;border-radius:12px;padding:14px 28px;font-size:18px;font-weight:700;cursor:pointer;flex:1;max-width:300px}
#send-btn:disabled{opacity:.3}
#clear-btn{background:#2a1030;color:#e94560;border:none;border-radius:12px;padding:14px 18px;font-size:18px;cursor:pointer}
#counter{position:fixed;top:12px;right:12px;background:#0f3460;padding:6px 14px;border-radius:16px;font-size:13px}
</style>
</head>
<body>
<div id="counter"></div>
<div id="rec-area">
  <button id="btn" class="idle" onclick="toggle()">
    <span id="icon">🎙</span>
    <span id="label">ЗАПИСАТЬ</span>
    <span id="timer"></span>
  </button>
  <div id="status">Нажми — говори — 3 сек тишины — готово</div>
</div>
<div id="list"></div>
<div id="send-bar">
  <button id="clear-btn" onclick="clearAll()">🗑</button>
  <button id="send-btn" onclick="sendAll()" disabled>📤 Отправить всё</button>
</div>
<script>
function initConfig(){
  const h=new URLSearchParams(location.hash.slice(1));
  if(h.get('t'))localStorage.setItem('zv_token',h.get('t'));
  if(h.get('c'))localStorage.setItem('zv_chat',h.get('c'));
  if(location.hash)history.replaceState(null,'',location.pathname);
  return{token:localStorage.getItem('zv_token'),chat:localStorage.getItem('zv_chat')};
}
const CFG=initConfig();
const BOT_TOKEN=CFG.token||'';
const CHAT_ID=CFG.chat||'';
const SILENCE_MS=3000;
const DB_NAME='zverclaw_voice';
const DB_STORE='queue';
let mediaRec=null,chunks=[],recording=false,analyser=null,animFrame=null;
let startTime=0,timerInterval=null;
let currentAudio=null,currentPlayBtn=null,currentAudioUrl=null;

function openDB(){
  return new Promise((ok,fail)=>{
    const r=indexedDB.open(DB_NAME,2);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE))
        db.createObjectStore(DB_STORE,{keyPath:'id',autoIncrement:true});
    };
    r.onsuccess=e=>ok(e.target.result);
    r.onerror=e=>fail(e);
  });
}
async function enqueue(blob,durSec){
  const db=await openDB();
  const tx=db.transaction(DB_STORE,'readwrite');
  tx.objectStore(DB_STORE).add({audio:blob,ts:Date.now(),dur:durSec,sent:false});
  return new Promise(ok=>{tx.oncomplete=ok});
}
async function getAll(){
  const db=await openDB();
  return new Promise(ok=>{
    const tx=db.transaction(DB_STORE,'readonly');
    tx.objectStore(DB_STORE).getAll().onsuccess=e=>ok(e.target.result);
  });
}
async function markSent(id){
  const db=await openDB();
  const tx=db.transaction(DB_STORE,'readwrite');
  const store=tx.objectStore(DB_STORE);
  const item=await new Promise(ok=>{store.get(id).onsuccess=e=>ok(e.target.result)});
  if(item){item.sent=true;store.put(item)}
  return new Promise(ok=>{tx.oncomplete=ok});
}
async function remove(id){
  const db=await openDB();
  const tx=db.transaction(DB_STORE,'readwrite');
  tx.objectStore(DB_STORE).delete(id);
  return new Promise(ok=>{tx.oncomplete=ok});
}
async function clearAllDB(){
  const db=await openDB();
  const tx=db.transaction(DB_STORE,'readwrite');
  tx.objectStore(DB_STORE).clear();
  return new Promise(ok=>{tx.oncomplete=ok});
}

const btn=document.getElementById('btn'),iconEl=document.getElementById('icon'),
      labelEl=document.getElementById('label'),statusEl=document.getElementById('status'),
      timerEl=document.getElementById('timer'),listEl=document.getElementById('list'),
      sendBtn=document.getElementById('send-btn'),counterEl=document.getElementById('counter');

function fmtTime(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function fmtClock(ts){const d=new Date(ts);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function setBtn(mode,msg){
  btn.className=mode;
  if(mode==='idle'){iconEl.textContent='🎙';labelEl.textContent='ЗАПИСАТЬ'}
  if(mode==='rec'){iconEl.textContent='⏺';labelEl.textContent='СТОП'}
  statusEl.textContent=msg||'';
}

function stopAudio(full){
  if(currentAudio){
    currentAudio.pause();
    if(full){
      if(currentAudioUrl)URL.revokeObjectURL(currentAudioUrl);
      currentAudio=null;currentAudioUrl=null;
    }
  }
  if(currentPlayBtn){currentPlayBtn.classList.remove('playing');currentPlayBtn.textContent='▶';if(full)currentPlayBtn=null}
}

async function renderList(){
  const all=await getAll();
  const unsent=all.filter(x=>!x.sent);
  listEl.innerHTML='';
  if(all.length===0){
    counterEl.textContent='';
    sendBtn.disabled=true;
    sendBtn.textContent='📤 Отправить всё';
    return;
  }
  counterEl.textContent=`${unsent.length} запис${unsent.length===1?'ь':unsent.length<5?'и':'ей'}`;
  sendBtn.disabled=unsent.length===0;
  sendBtn.textContent=unsent.length>0?`📤 Отправить (${unsent.length})`:'✅ Всё отправлено';

  all.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='item'+(item.sent?' sent':'');
    div.innerHTML=`
      <span class="num">${i+1}</span>
      <div class="info">
        <div class="dur">${fmtTime(item.dur*1000)}</div>
        <div>${fmtClock(item.ts)}${item.sent?' — отправлено ✅':''}</div>
      </div>
      <button class="play" data-id="${item.id}">▶</button>
      ${item.sent?'':`<button class="send-one" data-id="${item.id}" style="background:#0f3460;color:#4ecca3">📤</button>`}
      ${item.sent?'':`<button class="del" data-id="${item.id}">✕</button>`}
    `;
    listEl.appendChild(div);
  });

  listEl.querySelectorAll('.play').forEach(b=>{
    b.onclick=async()=>{
      const id=Number(b.dataset.id);
      // same button → resume or pause
      if(currentPlayBtn===b&&currentAudio){
        if(currentAudio.paused){
          b.classList.add('playing');b.textContent='⏸';
          currentAudio.play();
        }else{
          stopAudio(false);
        }
        return;
      }
      // different button → stop old, play new
      stopAudio(true);
      const items=await getAll();
      const item=items.find(x=>x.id===id);
      if(!item)return;
      currentAudioUrl=URL.createObjectURL(item.audio);
      currentAudio=new Audio(currentAudioUrl);
      currentPlayBtn=b;
      b.classList.add('playing');b.textContent='⏸';
      currentAudio.onended=()=>{stopAudio(true)};
      currentAudio.play();
    };
  });

  // send-one buttons
  listEl.querySelectorAll('.send-one').forEach(b=>{
    b.onclick=async()=>{
      if(!navigator.onLine){statusEl.textContent='Нет сети';return}
      const id=Number(b.dataset.id);
      const items=await getAll();
      const item=items.find(x=>x.id===id);
      if(!item)return;
      b.textContent='⏳';b.disabled=true;
      try{
        const fd=new FormData();
        fd.append('audio',item.audio,'voice.ogg');
        const r=await fetch(`${VOICE_API}/voice?key=${API_KEY}`,{method:'POST',body:fd});
        if(r.ok){await markSent(id);statusEl.textContent='Отправлено ✅'}
        else statusEl.textContent='Ошибка отправки';
      }catch(e){statusEl.textContent=`Сеть: ${e.message}`}
      await renderList();
    };
  });

  listEl.querySelectorAll('.del').forEach(b=>{
    b.onclick=async()=>{
      stopAudio(true);
      await remove(Number(b.dataset.id));
      renderList();
    };
  });
}

async function startRec(){
  try{
    stopAudio(true);
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    chunks=[];
    mediaRec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    mediaRec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(timerInterval);timerEl.textContent='';
      if(chunks.length===0){setBtn('idle','Пустая запись');return}
      const blob=new Blob(chunks,{type:'audio/ogg'});
      const dur=Math.round((Date.now()-startTime)/1000);
      await enqueue(blob,dur);
      setBtn('idle','Нажми — говори — 3 сек тишины — готово');
      await renderList();
      window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
    };
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(stream);
    analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    let lastSound=Date.now();
    function checkSilence(){
      if(!recording)return;
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      if(avg>8)lastSound=Date.now();
      if(Date.now()-lastSound>SILENCE_MS&&Date.now()-startTime>1500){stopRec();return}
      animFrame=requestAnimationFrame(checkSilence);
    }
    mediaRec.start(500);
    recording=true;
    startTime=Date.now();
    timerInterval=setInterval(()=>{timerEl.textContent=fmtTime(Date.now()-startTime)},500);
    setBtn('rec','Говори... (3 сек тишины → стоп)');
    checkSilence();
  }catch(e){setBtn('idle','Ошибка микрофона: '+e.message)}
}
function stopRec(){
  recording=false;
  if(animFrame)cancelAnimationFrame(animFrame);
  if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();
}
function toggle(){if(recording)stopRec();else startRec()}

const VOICE_API='https://ha.vzik-tech.ru/voice-api';
const API_KEY='zv-voice-2026';

async function sendAll(){
  if(!navigator.onLine){statusEl.textContent='Нет сети — отправлю когда появится';return}
  const all=await getAll();
  const unsent=all.filter(x=>!x.sent);
  if(unsent.length===0)return;
  sendBtn.disabled=true;
  let ok=0;
  for(let i=0;i<unsent.length;i++){
    sendBtn.textContent=`📤 ${i+1}/${unsent.length}...`;
    try{
      const fd=new FormData();
      fd.append('audio',unsent[i].audio,'voice.ogg');
      const r=await fetch(`${VOICE_API}/voice?key=${API_KEY}`,{method:'POST',body:fd});
      if(r.ok){await markSent(unsent[i].id);ok++}
      else{const t=await r.text();statusEl.textContent=`Ошибка: ${t.slice(0,80)}`;break}
    }catch(e){statusEl.textContent=`Сеть: ${e.message}`;break}
  }
  if(ok>0)statusEl.textContent=ok===unsent.length?`Отправлено ${ok} ✅ — бот обработает и ответит`:`Отправлено ${ok}/${unsent.length}`;
  await renderList();
}
async function clearAll(){
  const all=await getAll();
  const unsent=all.filter(x=>!x.sent);
  if(unsent.length>0&&!confirm(`Удалить ${unsent.length} неотправленных?`))return;
  await clearAllDB();
  renderList();
}

if(!BOT_TOKEN||!CHAT_ID){
  statusEl.textContent='Откройте ссылку с настройками';
  btn.disabled=true;btn.style.opacity='.3';
}else{renderList()}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW fail',e));
}
</script>
</body>
</html>
